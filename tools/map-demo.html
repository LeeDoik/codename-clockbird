<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>맵 데모 · 태엽새</title>
<style>
  :root {
    --bg: #17130e; --panel: #201a12; --line: #3a3120;
    --ink: #e8dcc0; --dim: #9a8f77; --brass: #c9a227; --teal: #5c9a86; --rust: #c25b4a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% -10%, #241d13, var(--bg) 60%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, "Malgun Gothic", sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 22px 16px 40px; min-height: 100%;
  }
  .mono { font-family: ui-monospace, "Cascadia Code", "Consolas", monospace; font-variant-numeric: tabular-nums; }
  header { text-align: center; }
  header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 650; }
  header h1 b { color: var(--brass); }
  header p { margin: 0; font-size: 12.5px; color: var(--dim); }

  .stage {
    position: relative; padding: 12px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 14px 44px rgba(0,0,0,.5);
  }
  .stage::before { content: ""; position: absolute; inset: 6px; border: 1px solid rgba(201,162,39,.2); border-radius: 9px; pointer-events: none; }
  canvas {
    display: block; image-rendering: pixelated; border-radius: 4px;
    max-width: 100%; height: auto; touch-action: none;
  }

  .hud {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--dim);
  }
  .hud .key { color: var(--ink); }
  kbd {
    font-family: ui-monospace, monospace; background: #2a2218; border: 1px solid var(--line);
    border-bottom-width: 2px; border-radius: 5px; padding: 1px 7px; font-size: 11px; color: var(--ink);
  }
  .toggles { display: flex; gap: 8px; }
  .toggles button {
    font-family: inherit; cursor: pointer; border: 1px solid var(--line);
    background: #2a2218; color: var(--dim); border-radius: 20px; padding: 5px 12px;
    font-size: 12px; font-weight: 600;
  }
  .toggles button[aria-pressed="true"] { color: var(--brass); border-color: var(--brass); background: rgba(201,162,39,.1); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--dim); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .box { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
</style>
</head>

  const l = Math.floor(px / TS), r = Math.floor((px + PW - 1) / TS);
  const t = Math.floor(py / TS), b = Math.floor((py + PH - 1) / TS);
  for (let ry = t; ry <= b; ry++) for (let cx = l; cx <= r; cx++) {
    if (ry < 0 || cx < 0 || ry >= ROWS || cx >= COLS) return true; // 맵 밖 = 벽
    const f = MAP.layout[ry][cx];
    if (f >= 0 && MAP.tiles[f] && MAP.tiles[f].solid) return true;
  }
  return false;
}

let last = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0); last = ts;

  const vx = (keys["d"]||keys["arrowright"]?1:0) - (keys["a"]||keys["arrowleft"]?1:0);
  const vy = (keys["s"]||keys["arrowdown"]?1:0) - (keys["w"]||keys["arrowup"]?1:0);
  // 축별로 이동·충돌 → 벽을 따라 미끄러진다
  const nx = player.x + vx * SPEED * dt;
  if (!solidAt(nx, player.y)) player.x = nx;
  const ny = player.y + vy * SPEED * dt;
  if (!solidAt(player.x, ny)) player.y = ny;

  render();
  requestAnimationFrame(loop);
}

function render() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = "#14110b";
  ctx.fillRect(0, 0, cv.width, cv.height);

  // 타일
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const f = MAP.layout[r][c];
    if (f >= 0) ctx.drawImage(sheet, f*TS, 0, TS, TS, c*TS, r*TS, TS, TS);
  }

  // 충돌 오버레이
  if (show.solid) {
    ctx.save(); ctx.globalAlpha = 0.34; ctx.fillStyle = "#c25b4a";
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const f = MAP.layout[r][c];
      if (f >= 0 && MAP.tiles[f].solid) ctx.fillRect(c*TS, r*TS, TS, TS);
    }
    ctx.restore();
  }

  // 격자
  if (show.grid) {
    ctx.strokeStyle = "rgba(201,162,39,.16)"; ctx.lineWidth = 1; ctx.beginPath();
    for (let c = 0; c <= COLS; c++) { ctx.moveTo(c*TS+.5, 0); ctx.lineTo(c*TS+.5, cv.height); }
    for (let r = 0; r <= ROWS; r++) { ctx.moveTo(0, r*TS+.5); ctx.lineTo(cv.width, r*TS+.5); }
    ctx.stroke();
  }

  // 스폰 마커
  if (show.spawn) {
    const marker = (col, row, color, label, ring) => {
      const x = col*TS + TS/2, y = row*TS + TS/2;
      ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = ring; ctx.stroke();
      ctx.fillStyle = "#17130e"; ctx.font = "700 12px ui-monospace, monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(label, x, y+.5);
    };
    MAP.spawns.allies.forEach((a, i) => marker(a.col, a.row, "#5c9a86", String(i+1), "#17130e"));
    if (MAP.spawns.citizen) marker(MAP.spawns.citizen.col, MAP.spawns.citizen.row, "#c9a227", "C", "#17130e");
  }

  // 플레이어
  ctx.fillStyle = "#e8dcc0";
  ctx.fillRect(player.x, player.y, PW, PH);
  ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 1;
  ctx.strokeRect(player.x+.5, player.y+.5, PW-1, PH-1);

  document.getElementById("pos").textContent =
    `칸 ${Math.floor((player.x+PW/2)/TS)}, ${Math.floor((player.y+PH/2)/TS)}`;
}

// 토글
const bind = (id, key) => {
  const b = document.getElementById(id);
  b.onclick = () => { show[key] = !show[key]; b.setAttribute("aria-pressed", show[key]); };
};
bind("t-grid", "grid"); bind("t-solid", "solid"); bind("t-spawn", "spawn");
</script>
</body>
</html>
