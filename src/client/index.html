<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>코드네임: 태엽새</title>
    <style>
      :root {
        --brass: #c9a227;
        --ink: #1a1712;
        --paper: #e8dcc0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--ink);
        color: var(--paper);
        font-family: 'Malgun Gothic', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      /* 캔버스 표시 크기 — 창에 들어가는 최대 14:9(896:576) 박스.
         내부 해상도는 main.js 가 896×576 으로 고정하고, Phaser FIT 모드가 이 박스를 채운다.
         (100vh - 72px) 는 상단 헤더 몫을 뺀 세로 여유. */
      #game-root {
        position: relative;
        width: min(100vw - 32px, calc((100vh - 72px) * 896 / 576));
        aspect-ratio: 896 / 576;
      }
      #game-canvas { width: 100%; height: 100%; }
      /* 픽셀 아트 확대가 흐릿해지지 않게 — CSS 업스케일 단계의 보간을 끈다 */
      #game-canvas canvas { display: block; image-rendering: pixelated; }

      /* 대화창은 DOM 오버레이 — 한글 입력과 스트리밍 표시에 유리하다. */
      #dialogue {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 16px;
        background: rgba(26, 23, 18, 0.94);
        border: 2px solid var(--brass);
        border-radius: 4px;
        padding: 14px 18px;
        display: none;
      }
      #dialogue.visible { display: block; }
      #dialogue-speaker { color: var(--brass); font-weight: 700; margin-bottom: 6px; }
      #dialogue-text { line-height: 1.6; min-height: 3em; white-space: pre-wrap; }
      #dialogue-hint { opacity: 0.5; font-size: 0.8rem; margin-top: 8px; }
      #dialogue-input { display: none; margin-top: 10px; gap: 8px; }
      #dialogue-input.visible { display: flex; }
      #dialogue-input input {
        flex: 1;
        background: #0f0d0a;
        border: 1px solid var(--brass);
        color: var(--paper);
        padding: 8px 10px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 1rem;
      }
      #dialogue-input input:disabled { opacity: 0.4; }
      #dialogue-input button {
        border: 0;
        font-weight: 700;
        padding: 8px 14px;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      #dialogue-input button:disabled { opacity: 0.35; cursor: default; }
      #dialogue-send { background: #4a7a6b; color: var(--paper); }
      /* 코드 전달은 되돌릴 수 없고 신뢰도를 깎는다 — 색으로 무게를 준다. */
      #dialogue-code { background: var(--brass); color: var(--ink); }
      header { padding: 12px; opacity: 0.55; font-size: 0.85rem; letter-spacing: 0.05em; }

      /* 결과 화면 — 씬 전환이 아니라 정지된 월드 위에 덮는 오버레이. */
      #result {
        position: absolute;
        inset: 0;
        background: rgba(10, 9, 7, 0.86);
        display: none;
        align-items: center;
        justify-content: center;
      }
      #result.visible { display: flex; }
      #result-card {
        border: 2px solid var(--brass);
        background: rgba(26, 23, 18, 0.96);
        border-radius: 4px;
        padding: 28px 36px;
        text-align: center;
        min-width: 340px;
        max-width: 80%;
      }
      #result-title { color: var(--brass); font-size: 1.5rem; font-weight: 700; letter-spacing: 0.08em; }
      #result-line { margin-top: 14px; line-height: 1.7; white-space: pre-wrap; }
      #result-code { margin-top: 12px; font-size: 1.1rem; }
      #result-code b { color: var(--brass); }
      #result-stats { margin-top: 12px; opacity: 0.6; font-size: 0.85rem; }
      #result-restart {
        margin-top: 22px;
        border: 0;
        background: var(--brass);
        color: var(--ink);
        font-family: inherit;
        font-weight: 700;
        font-size: 1rem;
        padding: 10px 26px;
        border-radius: 3px;
        cursor: pointer;
      }
      #result-restart:disabled { opacity: 0.35; cursor: default; }
      #result-wait { margin-top: 14px; opacity: 0.55; font-size: 0.85rem; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <header>코드네임: 태엽새</header>
    <div id="game-root">
      <div id="game-canvas"></div>
      <div id="dialogue">
        <div id="dialogue-speaker"></div>
        <div id="dialogue-text"></div>
        <div id="dialogue-input">
          <input id="dialogue-field" type="text" placeholder="말을 건넨다..." autocomplete="off" />
          <button id="dialogue-send">대화</button>
          <button id="dialogue-code">접선 코드 전달</button>
        </div>
        <div id="dialogue-hint">[Enter] 대화 · [Esc] 닫기</div>
      </div>
      <div id="result">
        <div id="result-card">
          <div id="result-title"></div>
          <div id="result-line"></div>
          <div id="result-code"></div>
          <div id="result-stats"></div>
          <button id="result-restart">다시 잠입한다</button>
          <div id="result-wait"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
