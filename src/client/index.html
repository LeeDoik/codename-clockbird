<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>코드네임: 태엽새</title>
    <style>
      :root {
        --brass: #c9a227;
        --ink: #1a1712;
        --paper: #e8dcc0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--ink);
        color: var(--paper);
        font-family: 'Malgun Gothic', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      /* 캔버스 표시 크기 — 창에 들어가는 최대 14:9(896:576) 박스.
         내부 해상도는 main.js 가 896×576 으로 고정하고, Phaser FIT 모드가 이 박스를 채운다.
         (100vh - 72px) 는 상단 헤더 몫을 뺀 세로 여유. */
      #game-root {
        position: relative;
        width: min(100vw - 32px, calc((100vh - 72px) * 896 / 576));
        aspect-ratio: 896 / 576;
      }
      #game-canvas { width: 100%; height: 100%; }
      /* 픽셀 아트 확대가 흐릿해지지 않게 — CSS 업스케일 단계의 보간을 끈다 */
      #game-canvas canvas { display: block; image-rendering: pixelated; }

      /* 대화창은 DOM 오버레이 — 한글 입력과 스트리밍 표시에 유리하다. */
      #dialogue {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 16px;
        background: rgba(26, 23, 18, 0.94);
        border: 2px solid var(--brass);
        border-radius: 4px;
        padding: 14px 18px;
        display: none;
      }
      #dialogue.visible { display: block; }
      #dialogue-speaker { color: var(--brass); font-weight: 700; margin-bottom: 6px; }
      #dialogue-text { line-height: 1.6; min-height: 3em; white-space: pre-wrap; }
      #dialogue-hint { opacity: 0.5; font-size: 0.8rem; margin-top: 8px; }
      #dialogue-input { display: none; margin-top: 10px; gap: 8px; }
      #dialogue-input.visible { display: flex; }
      #dialogue-input input {
        flex: 1;
        background: #0f0d0a;
        border: 1px solid var(--brass);
        color: var(--paper);
        padding: 8px 10px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 1rem;
      }
      #dialogue-input input:disabled { opacity: 0.4; }
      #dialogue-input button {
        border: 0;
        font-weight: 700;
        padding: 8px 14px;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      #dialogue-input button:disabled { opacity: 0.35; cursor: default; }
      #dialogue-send { background: #4a7a6b; color: var(--paper); }
      /* 코드 전달은 되돌릴 수 없고 신뢰도를 깎는다 — 색으로 무게를 준다. */
      #dialogue-code { background: var(--brass); color: var(--ink); }
      header { padding: 12px; opacity: 0.55; font-size: 0.85rem; letter-spacing: 0.05em; }

      /* 미니게임 패널 — 감옥 퍼즐과 검문 타이밍이 공유하는 껍데기. */
      #minigame {
        position: absolute;
        inset: 0;
        background: rgba(10, 9, 7, 0.78);
        display: none;
        align-items: center;
        justify-content: center;
      }
      #minigame.visible { display: flex; }
      #minigame-card {
        border: 2px solid var(--brass);
        background: rgba(26, 23, 18, 0.97);
        border-radius: 4px;
        padding: 22px 28px;
        min-width: 400px;
        max-width: 90%;
        text-align: center;
      }
      #minigame-title { color: var(--brass); font-weight: 700; letter-spacing: 0.06em; }
      #minigame-subtitle { margin-top: 6px; opacity: 0.7; font-size: 0.85rem; white-space: pre-wrap; }
      /* 제한 시간 — 남은 시간이 줄어드는 띠. width 를 JS 가 매 프레임 갱신한다. */
      #minigame-timer {
        margin-top: 14px;
        height: 4px;
        background: #0f0d0a;
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      #minigame-timer.visible { display: block; }
      #minigame-timer-fill { height: 100%; width: 100%; background: var(--brass); }
      #minigame-content { margin-top: 18px; }
      #minigame-hint { margin-top: 14px; opacity: 0.5; font-size: 0.8rem; min-height: 1.2em; }
      /* 성공/실패 판정 문구 — 결과를 읽을 틈을 주고 패널이 닫힌다. */
      #minigame-verdict { margin-top: 10px; font-weight: 700; min-height: 1.4em; }
      #minigame-verdict.ok { color: #6fae8e; }
      #minigame-verdict.fail { color: #c25b4a; }

      /* 미니게임 부품 — 퍼즐과 타이밍 게임이 함께 쓴다. */
      .mg-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .mg-row + .mg-row { margin-top: 12px; }
      .mg-btn {
        min-width: 52px;
        padding: 10px 12px;
        background: #0f0d0a;
        border: 1px solid #5c4f2e;
        border-radius: 3px;
        color: var(--paper);
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
      }
      .mg-btn:hover:not(:disabled) { border-color: var(--brass); }
      .mg-btn:disabled { cursor: default; }
      .mg-btn.sel { border-color: var(--brass); background: #2a2416; color: var(--brass); }
      .mg-btn.done { opacity: 0.3; }
      .mg-btn.bad { border-color: #c25b4a; color: #c25b4a; }
      .mg-legend { opacity: 0.75; font-size: 0.85rem; letter-spacing: 0.08em; margin-bottom: 14px; }
      .mg-legend b { color: var(--brass); }

      /* 심문 답변 — 선택지는 세로로 쌓고, 그 아래 자유 입력을 둔다. */
      .mg-col { display: flex; flex-direction: column; gap: 8px; }
      .mg-col .mg-btn { text-align: left; }
      .mg-free { display: flex; gap: 8px; margin-top: 12px; }
      .mg-free input {
        flex: 1;
        background: #0f0d0a;
        border: 1px solid #5c4f2e;
        color: var(--paper);
        padding: 8px 10px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 0.95rem;
      }
      .mg-free .mg-btn { background: var(--brass); color: var(--ink); border-color: var(--brass); font-weight: 700; }

      /* 타이밍 바 — 커서가 좌우로 왕복하고, 목표 구간 안에서 멈춰야 한다. */
      .mg-track {
        position: relative;
        height: 34px;
        background: #0f0d0a;
        border: 1px solid #5c4f2e;
        border-radius: 3px;
        overflow: hidden;
      }
      .mg-zone { position: absolute; top: 0; bottom: 0; background: rgba(111, 174, 142, 0.28); }
      .mg-cursor { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--brass); }

      /* 결과 화면 — 씬 전환이 아니라 정지된 월드 위에 덮는 오버레이. */
      #result {
        position: absolute;
        inset: 0;
        background: rgba(10, 9, 7, 0.86);
        display: none;
        align-items: center;
        justify-content: center;
      }
      #result.visible { display: flex; }
      #result-card {
        border: 2px solid var(--brass);
        background: rgba(26, 23, 18, 0.96);
        border-radius: 4px;
        padding: 28px 36px;
        text-align: center;
        min-width: 340px;
        max-width: 80%;
      }
      #result-title { color: var(--brass); font-size: 1.5rem; font-weight: 700; letter-spacing: 0.08em; }
      #result-line { margin-top: 14px; line-height: 1.7; white-space: pre-wrap; }
      #result-code { margin-top: 12px; font-size: 1.1rem; }
      #result-code b { color: var(--brass); }
      #result-stats { margin-top: 12px; opacity: 0.6; font-size: 0.85rem; }
      #result-restart {
        margin-top: 22px;
        border: 0;
        background: var(--brass);
        color: var(--ink);
        font-family: inherit;
        font-weight: 700;
        font-size: 1rem;
        padding: 10px 26px;
        border-radius: 3px;
        cursor: pointer;
      }
      #result-restart:disabled { opacity: 0.35; cursor: default; }
      #result-wait { margin-top: 14px; opacity: 0.55; font-size: 0.85rem; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <header>코드네임: 태엽새</header>
    <div id="game-root">
      <div id="game-canvas"></div>
      <div id="dialogue">
        <div id="dialogue-speaker"></div>
        <div id="dialogue-text"></div>
        <div id="dialogue-input">
          <input id="dialogue-field" type="text" placeholder="말을 건넨다..." autocomplete="off" />
          <button id="dialogue-send">대화</button>
          <button id="dialogue-code">접선 코드 전달</button>
        </div>
        <div id="dialogue-hint">[Enter] 대화 · [Esc] 닫기</div>
      </div>
      <div id="minigame">
        <div id="minigame-card">
          <div id="minigame-title"></div>
          <div id="minigame-subtitle"></div>
          <div id="minigame-timer"><div id="minigame-timer-fill"></div></div>
          <div id="minigame-content"></div>
          <div id="minigame-hint"></div>
          <div id="minigame-verdict"></div>
        </div>
      </div>
      <div id="result">
        <div id="result-card">
          <div id="result-title"></div>
          <div id="result-line"></div>
          <div id="result-code"></div>
          <div id="result-stats"></div>
          <button id="result-restart">다시 잠입한다</button>
          <div id="result-wait"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
